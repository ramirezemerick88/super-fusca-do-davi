<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Super Fusca do Davi</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

canvas{
display:block;
}

#hud{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.6);
color:white;
padding:10px;
border-radius:8px;
}

#turboBtn{
position:absolute;
bottom:40px;
right:30px;
background:red;
color:white;
padding:20px;
border-radius:50%;
font-size:18px;
}

</style>

</head>

<body>

<div id="hud">

🚗 Super Fusca do Davi<br>
Pontuação: <span id="score">0</span><br>
⛽ Combustível: <span id="fuel">100</span><br>
🏆 Recorde: <span id="record">0</span>

</div>

<div id="turboBtn">⚡</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight


let roadWidth=260
let roadX=canvas.width/2-roadWidth/2


let car={
x:canvas.width/2,
y:canvas.height-160,
width:70,
height:110
}


// trânsito

let traffic=[]


// combustível

let fuel=100


// ranking

let record=localStorage.getItem("fusca_record")||0

document.getElementById("record").innerText=record


// estado jogo

let score=0
let speed=6
let turbo=false

let touchX=car.x

let coins=[]


// controle toque

canvas.addEventListener("touchmove",e=>{

touchX=e.touches[0].clientX

})


// turbo

document.getElementById("turboBtn").onclick=()=>{

turbo=true

setTimeout(()=>{

turbo=false

},2000)

}


// spawn trânsito

function spawnTraffic(){

traffic.push({

x:roadX+Math.random()*(roadWidth-60),
y:-120,
width:60,
height:110

})

}

setInterval(spawnTraffic,1500)


// spawn moedas

function spawnCoin(){

coins.push({

x:roadX+Math.random()*(roadWidth-40),
y:-40,
size:30

})

}

setInterval(spawnCoin,2000)


// desenhar cidade

function drawCity(){

ctx.fillStyle="#666"

for(let i=0;i<canvas.height;i+=160){

ctx.fillRect(roadX-120,i,80,140)
ctx.fillRect(roadX+roadWidth+40,i,80,140)

}

}


// carro

function drawCar(){

ctx.fillStyle="red"

ctx.fillRect(
car.x-car.width/2,
car.y,
car.width,
car.height
)

}


// loop

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height)


// modo noite

let night=score>2000

if(night){

ctx.fillStyle="#001133"

}else{

ctx.fillStyle="#2f7d2f"

}

ctx.fillRect(0,0,canvas.width,canvas.height)


// cidade

drawCity()


// estrada

ctx.fillStyle="#444"
ctx.fillRect(roadX,0,roadWidth,canvas.height)


// linha pista

ctx.strokeStyle="white"
ctx.setLineDash([20,20])

ctx.beginPath()
ctx.moveTo(canvas.width/2,0)
ctx.lineTo(canvas.width/2,canvas.height)
ctx.stroke()

ctx.setLineDash([])


// mover carro

car.x+=(touchX-car.x)*0.2


let currentSpeed=turbo?speed*2:speed


// trânsito

ctx.fillStyle="blue"

traffic.forEach((t,i)=>{

t.y+=currentSpeed

ctx.fillRect(t.x,t.y,t.width,t.height)


// colisão

if(
car.x-car.width/2 < t.x+t.width &&
car.x+car.width/2 > t.x &&
car.y < t.y+t.height &&
car.y+car.height > t.y
){

gameOver()

}

})


// moedas

ctx.fillStyle="yellow"

coins.forEach((c,i)=>{

c.y+=currentSpeed

ctx.beginPath()
ctx.arc(c.x,c.y,c.size/2,0,Math.PI*2)
ctx.fill()


if(
car.x-car.width/2 < c.x+c.size &&
car.x+car.width/2 > c.x &&
car.y < c.y+c.size &&
car.y+car.height > c.y
){

score+=100
coins.splice(i,1)

}

})


// combustível

fuel-=0.02

if(fuel<0){

gameOver()

}


// desenhar carro

drawCar()


// pontuação

score++

document.getElementById("score").innerText=Math.floor(score)

document.getElementById("fuel").innerText=Math.floor(fuel)

requestAnimationFrame(update)

}


// game over

function gameOver(){

if(score>record){

localStorage.setItem("fusca_record",Math.floor(score))

}

alert("Game Over! Pontuação: "+Math.floor(score))

location.reload()

}


update()

</script>

</body>
</html>
