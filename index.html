<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Super Fusca do Davi</title>

<style>

body{
margin:0;
overflow:hidden;
background:#87CEEB;
font-family:Arial;
}

canvas{
display:block;
}

#hud{

position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.6);
color:white;
padding:10px;
border-radius:8px;

}

</style>

</head>

<body>

<div id="hud">

🚗 Super Fusca do Davi<br>
Pontuação: <span id="score">0</span>

</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight


let roadWidth = 250
let roadX = canvas.width/2-roadWidth/2

let car = {

x: canvas.width/2,
y: canvas.height-160,
width:70,
height:110

}

let obstacles = []
let score = 0
let speed = 7

let touchX = car.x


// controle touch

canvas.addEventListener("touchmove", e=>{

touchX = e.touches[0].clientX

})


// obstáculo

function spawnObstacle(){

obstacles.push({

x: roadX + Math.random()*(roadWidth-60),
y:-120,
width:60,
height:90

})

}

setInterval(spawnObstacle,1000)


// desenhar fusca simples

function drawCar(){

ctx.fillStyle="red"

ctx.fillRect(

car.x-car.width/2,
car.y,
car.width,
car.height

)


// rodas

ctx.fillStyle="black"

ctx.fillRect(car.x-car.width/2-5,car.y+20,10,30)
ctx.fillRect(car.x+car.width/2-5,car.y+20,10,30)

ctx.fillRect(car.x-car.width/2-5,car.y+60,10,30)
ctx.fillRect(car.x+car.width/2-5,car.y+60,10,30)

}


// loop

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height)


// grama

ctx.fillStyle="#2f7d2f"
ctx.fillRect(0,0,canvas.width,canvas.height)


// estrada

ctx.fillStyle="#444"

ctx.fillRect(roadX,0,roadWidth,canvas.height)


// linhas da pista

ctx.strokeStyle="white"
ctx.setLineDash([20,20])

ctx.beginPath()
ctx.moveTo(canvas.width/2,0)
ctx.lineTo(canvas.width/2,canvas.height)
ctx.stroke()

ctx.setLineDash([])


// mover carro

car.x += (touchX-car.x)*0.15


// desenhar carro

drawCar()


// obstáculos

ctx.fillStyle="orange"

obstacles.forEach(o=>{

o.y += speed

ctx.fillRect(o.x,o.y,o.width,o.height)


// colisão

if(

car.x-car.width/2 < o.x + o.width &&
car.x+car.width/2 > o.x &&
car.y < o.y + o.height &&
car.y + car.height > o.y

){

alert("Game Over! Pontuação: "+score)
location.reload()

}

})


// pontuação

score++
document.getElementById("score").innerText = score


requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
